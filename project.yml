name: BudgetVault
options:
  bundleIdPrefix: io.budgetvault
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "L88VARJGC6"
    CODE_SIGN_STYLE: "Automatic"

schemes:
  BudgetVault:
    build:
      targets:
        BudgetVault: all
        BudgetVaultWidgetExtension: all
    run:
      config: Debug
      storeKitConfiguration: BudgetVault/Configuration.storekit

targets:
  BudgetVault:
    type: application
    platform: iOS
    sources:
      - BudgetVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.budgetvault.app
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BudgetVault/BudgetVault.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: BudgetVault/Info.plist
      properties:
        CFBundleDisplayName: BudgetVault
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSFaceIDUsageDescription: "BudgetVault uses Face ID to protect your financial data."
        BGTaskSchedulerPermittedIdentifiers:
          - io.budgetvault.app.refresh

    dependencies:
      - target: BudgetVaultWidgetExtension

  BudgetVaultWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - BudgetVaultWidget
    info:
      path: BudgetVaultWidget/Info.plist
      properties:
        CFBundleDisplayName: BudgetVault Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.budgetvault.app.widget
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "5"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BudgetVaultWidget/BudgetVaultWidget.entitlements
