name: BudgetVault
options:
  bundleIdPrefix: com.budgetvault
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  BudgetVault:
    type: application
    platform: iOS
    sources:
      - BudgetVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetvault.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BudgetVault/BudgetVault.entitlements
    info:
      path: BudgetVault/Info.plist
      properties:
        CFBundleDisplayName: BudgetVault
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        NSFaceIDUsageDescription: "BudgetVault uses Face ID to protect your financial data."
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: YXJlcGIud.skadnetwork
    dependencies:
      - target: BudgetVaultWidgetExtension

  BudgetVaultWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - BudgetVaultWidget
    info:
      path: BudgetVaultWidget/Info.plist
      properties:
        CFBundleDisplayName: BudgetVault Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetvault.app.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BudgetVaultWidget/BudgetVaultWidget.entitlements
