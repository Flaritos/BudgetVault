name: BudgetVault
options:
  bundleIdPrefix: io.budgetvault
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  BudgetVaultShared:
    path: BudgetVaultShared

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "L88VARJGC6"
    CODE_SIGN_STYLE: "Automatic"

schemes:
  BudgetVault:
    build:
      targets:
        BudgetVault: all
        BudgetVaultWidgetExtension: all
        BudgetVaultTests: [test]
        BudgetVaultUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BudgetVault/Configuration.storekit
    test:
      config: Debug
      storeKitConfiguration: BudgetVault/Configuration.storekit
      targets:
        - BudgetVaultTests
        - BudgetVaultUITests

targets:
  BudgetVault:
    type: application
    platform: iOS
    sources:
      - BudgetVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.budgetvault.app
        MARKETING_VERSION: "3.3.1"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BudgetVault/BudgetVault.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: BudgetVault/Info.plist
      properties:
        CFBundleDisplayName: BudgetVault
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        # Audit 2026-04-22 P2-15: was an empty dict — iOS rendered a
        # white flash during the transition from splash to first frame.
        # Now uses the brand navy so the splash-to-LaunchScreenView
        # transition is seamless.
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
          UIImageName: ""
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSFaceIDUsageDescription: "BudgetVault uses Face ID to protect your financial data."
        NSPhotoLibraryAddUsageDescription: "BudgetVault needs access to save your monthly wrapped card to your photo library."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        BGTaskSchedulerPermittedIdentifiers:
          - io.budgetvault.app.refresh
        # Audit 2026-04-23 Compliance: removed legacy `UIBackgroundModes:
        # fetch` entry. BGTaskScheduler's BGAppRefreshTaskRequest does
        # NOT require a UIBackgroundModes entry — only the
        # `BGTaskSchedulerPermittedIdentifiers` key above. The `fetch`
        # background mode is for the legacy
        # `application(_:performFetchWithCompletionHandler:)` API which
        # this app doesn't use. Declaring unused modes triggers
        # Guideline 2.5.4 scrutiny during Review.

    dependencies:
      - target: BudgetVaultWidgetExtension
      - package: BudgetVaultShared

  BudgetVaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BudgetVaultTests
    dependencies:
      - target: BudgetVault
      - package: BudgetVaultShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.budgetvault.app.tests
        GENERATE_INFOPLIST_FILE: YES

  BudgetVaultUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BudgetVaultUITests
    dependencies:
      - target: BudgetVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.budgetvault.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: BudgetVault

  BudgetVaultWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - BudgetVaultWidget
      - path: BudgetVault/Models/BudgetActivityAttributes.swift
    info:
      path: BudgetVaultWidget/Info.plist
      properties:
        CFBundleDisplayName: BudgetVault Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: BudgetVaultShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.budgetvault.app.widget
        MARKETING_VERSION: "3.3.1"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: BudgetVaultWidget/BudgetVaultWidget.entitlements
